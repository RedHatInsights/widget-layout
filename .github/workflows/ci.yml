name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Node setup
        uses: actions/setup-node@v3
        with:
          node-version: 22.19.0
          cache: 'npm'
      - uses: actions/cache@v3
        id: node_modules-cache
        with:
          path: |
            **/node_modules
            /home/runner/.cache/Cypress
          key: install-cache-${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - run: npm i

  test-unit:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Node setup
        uses: actions/setup-node@v3
        with:
          node-version: 22.19.0
          cache: 'npm'
      - uses: actions/cache@v3
        id: node_modules-cache
        with:
          path: "**/node_modules"
          key: install-cache-${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - run: npm i
      - run: npm run test -- --coverage

  lint:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Node setup
        uses: actions/setup-node@v3
        with:
          node-version: 22.19.0
          cache: 'npm'
      - uses: actions/cache@v3
        id: node_modules-cache
        with:
          path: "**/node_modules"
          key: install-cache-${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - run: npm i
      - run: npm run lint

  cypress-component:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Node setup
        uses: actions/setup-node@v3
        with:
          node-version: 22.19.0
          cache: 'npm'
      - uses: actions/cache@v3
        id: node_modules-cache
        with:
          path: "**/node_modules"
          key: install-cache-${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - run: npm i
      - uses: cypress-io/github-action@v6
        with:
          component: true
          install-command: npx cypress install
          browser: chrome

  build:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Node setup
        uses: actions/setup-node@v3
        with:
          node-version: 22.19.0
          cache: 'npm'
      - uses: actions/cache@v3
        id: node_modules-cache
        with:
          path: "**/node_modules"
          key: install-cache-${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - run: npm i
      - run: npm run build
