apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/widget-layout?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://github.com/RedHatInsights/konflux-pipelines/raw/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: widget-layout
    appstudio.openshift.io/component: widget-layout
    pipelines.appstudio.openshift.io/type: build
  name: widget-layout-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/widget-layout/widget-layout:on-pr-{{revision}}
    - name: image-expires-after
      value: 5d
    - name: dockerfile
      value: build-tools/Dockerfile
    - name: unit-tests-script
      value: |
        #!/bin/bash
        set -ex

        npm install
        npm run lint
        npm test --  --runInBand --no-cache
    - name: test-app-name
      value: "widget-layout"
    - name: test-app-port
      value: "8000"
    - name: run-app-script
      value: |
        #!/bin/bash
        set -ex
        # Start Caddy to serve app assets on port 8000
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    - name: frontend-proxy-routes-configmap
      value: "widget-layout-dev-proxy-caddyfile"
    - name: e2e-playwright-image
      value: mcr.microsoft.com/playwright:v1.58.0-jammy
    - name: e2e-tests-script
      value: |
        #!/bin/bash
        set -ex

        # Map secret keys to expected environment variables
        # Secret keys (e2e-hcc-env-url) get converted to ENV vars with uppercase and underscores
        export HCC_ENV_URL="${E2E_HCC_ENV_URL}"
        export E2E_STAGE_ACTUAL_HOSTNAME="${E2E_STAGE_ACTUAL_HOSTNAME}"

        # Log environment for debugging (without exposing sensitive data)
        echo "===== E2E Test Environment ====="
        echo "HCC_ENV_URL: ${HCC_ENV_URL:-NOT SET}"
        echo "E2E_USER: ${E2E_USER:+***SET***}"
        echo "E2E_PASSWORD: ${E2E_PASSWORD:+***SET***}"
        echo "E2E_STAGE_ACTUAL_HOSTNAME: ${E2E_STAGE_ACTUAL_HOSTNAME:-NOT SET}"
        echo "================================"

        # Wait for dev server to be ready (critical!)
        echo "Waiting for dev server to be ready..."
        timeout 120s bash -c 'until curl -k https://${E2E_STAGE_ACTUAL_HOSTNAME}:1337 > /dev/null 2>&1; do
          echo "Waiting for dev server to be ready..."
          sleep 5
        done'
        echo "✅ Dev server ready!"

        echo "Running Playwright tests..."
        npx playwright test
    - name: e2e-credentials-secret
      value: "widget-layout-credentials-secret"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/RedHatInsights/konflux-pipelines
    - name: revision
      value: main
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-widget-layout
  taskRunSpecs:
    - pipelineTaskName: run-e2e-tests
      serviceAccountName: build-pipeline-widget-layout
      podTemplate:
        # Override /etc/hosts to redirect stage hostname to localhost
        # NOTE: hostAliases doesn't support variable substitution - must be hardcoded
        # TODO: Update this hostname to match the value stored in Vault at creds/konflux/widget-layout (e2e-stage-actual-hostname property)
        hostAliases:
          - ip: "::1"
            hostnames:
              - "console.stage.redhat.com"
          - ip: "127.0.0.1"
            hostnames:
              - "console.stage.redhat.com"
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        metadata:
          creationTimestamp: null
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
        status: {}
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
status: {}
