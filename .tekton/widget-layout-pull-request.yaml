apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/widget-layout?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: '3'
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://raw.githubusercontent.com/RedHatInsights/konflux-pipelines/refs/heads/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: widget-layout
    appstudio.openshift.io/component: widget-layout
    pipelines.appstudio.openshift.io/type: build
  name: widget-layout-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/widget-layout/widget-layout:on-pr-{{revision}}
    - name: image-expires-after
      value: 5d
    - name: dockerfile
      value: build-tools/Dockerfile
    - name: unit-tests-script
      value: |
        #!/bin/bash
        set -ex

        npm install
        npm run lint
        npm test --  --runInBand --no-cache
    - name: test-app-name
      value: widget-layout
    - name: test-app-port
      value: "8000"
    - name: run-app-script
      value: |
        #!/bin/sh
        # Run the application using the container's built-in Caddyfile

        set -e

        echo "Starting application with container's built-in Caddy configuration..."
        exec caddy run --config /etc/caddy/Caddyfile
    - name: e2e-playwright-image
      value: mcr.microsoft.com/playwright:v1.58.0-jammy
    - name: e2e-tests-script
      value: |
        #!/bin/bash
        set -ex

        timeout 120s bash -c 'until curl -k https://stage.foo.redhat.com:1337 > /dev/null 2>&1; do
          echo "Waiting for dev server to be ready"
          sleep 5
        done'
        echo "Dev server ready!"

        echo "Running Playwright tests ..."
        npx playwright test
    - name: frontend-proxy-routes-configmap
      value: widget-layout-dev-proxy-caddyfile
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/RedHatInsights/konflux-pipelines
    - name: revision
      value: main
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-widget-layout
  taskRunSpecs:
    - pipelineTaskName: run-e2e-tests
      serviceAccountName: build-pipeline-widget-layout
      podTemplate:
        # Override /etc/hosts to redirect stage.foo.redhat.com to localhost
        hostAliases:
          - ip: "::1"
            hostnames:
              - "stage.foo.redhat.com"
          - ip: "127.0.0.1"
            hostnames:
              - "stage.foo.redhat.com"
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        metadata:
          creationTimestamp: null
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 3Gi
        status: {}
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
status: {}
